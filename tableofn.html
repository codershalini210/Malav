<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function  showtable()
        {
            let n = parseInt(document.getElementById("txtn").value)
            document.getElementById("ptable").innerHTML=""
            for( i=1;i<=10;i++)
        {
            document.getElementById("ptable").innerHTML+= n*i +"<br>"
        }
        }
    </script>
</head>
<body>
    <input type="text" id="txtn">
    <input type="button" value="Click here "  onclick="showtable()" >
    <p id="ptable"></p>
    
</body>
</html>
