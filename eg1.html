<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function welcome()
        {
            let txtname = document.getElementById("txtname")
            let pwelcome = document.getElementById("pwelcome")
            pwelcome.innerHTML = "welcome "+ txtname.value
        }
    </script>
</head>
<body>
    <p>
        Enter name : <input type="text" id="txtname">
    </p>
    <input type="button" value="Click here" onclick="welcome()">
    <p id="pwelcome"></p>    
</body>
</html>
