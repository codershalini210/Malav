<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function fun1()
        {
            let pnumbers =document.getElementById("pnumbers")
            pnumbers.innerHTML = ""
            let i = 1;
            while(i<=10)
            {
                pnumbers.innerHTML += i + "<br>"
                i++
            }
        }
    </script>
</head>
<body>
    <input type="button" value="Click here " onclick="fun1()">
    <p id="pnumbers"></p>
    
</body>
</html>
