<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        
            let ary =[]
        function addData()
        {
            let pdata = document.getElementById("pdata")
            let txtname = document.getElementById("txtname")
            ary.push(txtname.value)
            pdata.innerHTML = ""
            for(var i=ary.length-1;i>=0;i--)
        {
            pdata.innerHTML+= ary[i]
        }
        }
    </script>
</head>
<body>
  enter name   <input type="text" id="txtname">
  <input type="button" value="Add" onclick="addData()">
  <p id="pdata">
  </p>
    
</body>
</html>
